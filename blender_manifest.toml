schema_version = "1.0.0"

id = "hallway_avatar_gen"
version = "0.1.0"
name = "Hallway Avatar Gen"
tagline = "Import See-through PSD layers now; 2.5-D avatar generation is coming later"
maintainer = "Tyler Walker"
type = "add-on"

tags = ["Animation", "Import-Export", "Mesh"]
blender_version_min = "4.2.0"
platforms = ["windows-x64", "linux-x64", "macos-arm64"]

license = ["SPDX:GPL-3.0-or-later"]

copyright = [
  "2026 Tyler Walker",
]

[permissions]
files = "Import PSD files and write cached layer images"

[build]
paths_exclude_pattern = [
  "__pycache__/",
  ".mypy_cache/",
  ".pytest_cache/",
  ".ruff_cache/",
  "/.git/",
  "/.github/",
  ".gitignore",
  ".gitattributes",
  "*.pyc",
  "*.pyo",
  "*.pyd",
  "*.zip",
  "*.log",
  "*.bat",
  "*.sh",
  ".DS_Store",
  "Thumbs.db",
  ".vscode/",
  ".idea/",
  "*.egg-info/",
]
